name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          pip install pyinstaller
          pip install kivy kivy-garden kivy-garden.graph

          pip install kivy_deps.sdl2 kivy_deps.glew kivy_deps.angle
          pip install bleak
          pip install zeroconf

      - name: Force Kivy OpenGL backend (fix for CI headless)
        shell: pwsh
        run: |
          echo "KIVY_GL_BACKEND=angle_sdl2" >> $env:GITHUB_ENV
          echo "KIVY_WINDOW=sdl2" >> $env:GITHUB_ENV
          echo "KIVY_NO_ARGS=1" >> $env:GITHUB_ENV

      - name: Build EXE with spec
        shell: pwsh
        run: |
          pyinstaller LGS-Win64.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/