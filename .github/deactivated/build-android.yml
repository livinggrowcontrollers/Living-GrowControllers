name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: $HOME/Android/Sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          # no gradle cache here (repo has no gradle wrapper files)

      - name: Install OS packages (SDK tools dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip wget python3-venv openjdk-17-jdk build-essential zlib1g-dev libstdc++6 libffi-dev libssl-dev

      - name: Install Android commandline-tools
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools"/* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/" || true
          rm /tmp/cmdline-tools.zip
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
          sdkmanager --version || true

      - name: Install Android SDK components (platforms, build-tools, platform-tools, ndk)
        env:
          PATH: "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${PATH}"
        run: |
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653" "cmake;3.22.1" || true
          yes | sdkmanager --licenses --sdk_root="${ANDROID_SDK_ROOT}" || true

      - name: Create Python venv and install Buildozer
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.4.6
          pip install python-for-android==0.12.0
          pip install -r requirements.txt || true
        shell: bash

      - name: Show environment info
        run: |
          . .venv/bin/activate
          python --version
          javac -version || true
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}" || true

      - name: Build APK with Buildozer
        working-directory: ${{ github.workspace }}
        env:
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          . .venv/bin/activate
          buildozer --version
          buildozer android debug || true
        shell: bash

      - name: Find generated APKs
        run: |
          set -e
          . .venv/bin/activate
          echo "Searching for apks..."
          find . -type f -name "*.apk" -print || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            **/*.apk
