name: Build Linux

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 libmtdev1

      - run: python -m pip install --upgrade pip
      - run: pip install pyinstaller kivy kivy-garden kivy-garden.graph

      - name: Build (headless fix)
        env:
          KIVY_NO_ARGS: "1"
          KIVY_WINDOW: "mock"
          KIVY_GL_BACKEND: "mock"
        run: pyinstaller LGS.spec --clean --noconfirm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/